<div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow-md border mt-6">
    <h2 class="text-xl font-bold mb-4 text-gray-700">Form Mahasiswa</h2>
    <form method="POST" action="{{action}}">
        <div class="mb-4">
            <label class="block text-gray-600 text-sm mb-1">Nama Mahasiswa</label>
            <input type="text" name="nama" value="{{nama}}" class="w-full border p-2 rounded focus:outline-blue-500" required>
        </div>
        <div class="mb-4">
            <label class="block text-gray-600 text-sm mb-1">Jurusan</label>
            <input type="text" name="jurusan" value="{{jurusan}}" class="w-full border p-2 rounded focus:outline-blue-500" required>
        </div>
        <div class="mb-4">
            <label class="block text-gray-600 text-sm mb-1">Angkatan</label>
            <input type="number" name="angkatan" value="{{angkatan}}" class="w-full border p-2 rounded focus:outline-blue-500" required>
        </div>
        <div class="flex justify-end gap-2">
            <a href="/" class="bg-gray-400 text-white px-4 py-2 rounded hover:bg-gray-500">Batal</a>
            <button type="submit" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded shadow transition">
                Simpan Data
            </button>
        </div>
    </form>
</div>
